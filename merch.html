<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch | EventOrg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Agency+FB:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        :root {
            --bg-color: #0d0d12;
            --surface-color: rgba(255, 255, 255, 0.05);
            --primary-accent: #ff4a57;
            --secondary-accent: #ff8f70;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 74, 87, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(122, 75, 53, 0.08), transparent 25%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .header { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(13, 13, 18, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 20px; }
        .menu-trigger { font-size: 24px; cursor: pointer; color: var(--text-main); transition: color 0.3s; }
        .menu-trigger:hover { color: var(--primary-accent); }
        .logo { font-family: 'Agency FB', sans-serif; font-size: 32px; font-weight: bold; letter-spacing: 2px; }
        .logo-accent { color: var(--primary-accent); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .auth-btn { 
            background: linear-gradient(45deg, var(--primary-accent), var(--secondary-accent)); 
            border: none; padding: 10px 22px; color: white; font-weight: 600; border-radius: 30px; 
            cursor: pointer; transition: 0.3s; letter-spacing: 1px; font-size: 12px; text-transform: uppercase;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 74, 87, 0.4); }

        /* --- Sidebar & Overlay --- */
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: rgba(20, 20, 28, 0.98); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); z-index: 1001; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 40px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .close-btn { font-size: 30px; cursor: pointer; color: var(--text-muted); transition: color 0.3s; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-links a { text-decoration: none; color: var(--text-main); font-size: 18px; transition: all 0.3s ease; }
        .sidebar-links a:hover { color: var(--primary-accent); transform: translateX(10px); }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
        .menu-overlay.active { opacity: 1; visibility: visible; }

        /* --- Grid --- */
        .section { padding: 140px 5% 80px; max-width: 1400px; margin: 0 auto; }
        .glass-heading { font-family: 'Agency FB', sans-serif; font-size: 60px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 60px; text-align: center; }

        .merch-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
        }

        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .image-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #1a1a24; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }

        .info { padding: 20px; }
        .item-title { font-size: 16px; margin-bottom: 10px; display: block; }
        .item-price { color: var(--primary-accent); font-weight: bold; font-size: 20px; display: block; margin-bottom: 15px; }

        .qty-ctrl {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 5px;
        }

        .ctrl-btn {
            background: none; border: none; color: #fff; width: 35px; height: 35px;
            cursor: pointer; font-size: 20px; border-radius: 50%; transition: 0.2s;
        }
        .ctrl-btn:hover { background: var(--primary-accent); }
        .qty-display { font-weight: bold; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <div class="menu-trigger" onclick="toggleMenu()">☰</div>
            <div class="logo"><span class="logo-main">EVENT</span><span class="logo-accent">ORG</span></div>
        </div>
        
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="ticket.html">Tickets</a></li>
        </ul>

        <div class="header-right">
            <button class="auth-btn" onclick="window.location.href='login.html'">LOGIN</button>
            <button class="auth-btn" onclick="window.location.href='cart.html'">
                CART (<span id="globalCartCount">0</span>)
            </button>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 style="font-family:'Agency FB'; font-size:24px; color:#fff;">QUICK MENU</h3>
            <div class="close-btn" onclick="toggleMenu()">×</div>
        </div>
        <div class="sidebar-links">
            <a href="game.html" style="color:var(--primary-accent); font-weight: bold;">⚡ Play Neon Rush</a>
            <a href="ticket.html">Payment & Tickets</a>
            <a href="contact.html">Support Center</a>
        </div>
    </div>

    <div id="merch-root"></div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRODUCTS = [
            { id: 'm1', title: "Ferrari Team Polo", price: 3499, img: "https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?auto=format&fit=crop&w=800" },
            { id: 'm2', title: "Mercedes Rain Jacket", price: 2999, img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?auto=format&fit=crop&w=800" },
            { id: 'm3', title: "Red Bull Team Cap", price: 1299, img: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&w=800" },
            { id: 'm4', title: "McLaren Pit Lanyard", price: 999, img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=800" }
        ];

        const ProductCard = ({ product, initialQty, onUpdate }) => {
            const [qty, setQty] = useState(initialQty);

            const adjust = (delta) => {
                const newQty = Math.max(0, qty + delta);
                setQty(newQty);
                onUpdate(product, newQty);
            };

            return (
                <div className="product-card">
                    <div className="image-container"><img src={product.img} alt={product.title} /></div>
                    <div className="info">
                        <span className="item-title">{product.title}</span>
                        <span className="item-price">₹{product.price.toLocaleString()}</span>
                        <div className="qty-ctrl">
                            <button className="ctrl-btn" onClick={() => adjust(-1)}>−</button>
                            <span className="qty-display">{qty}</span>
                            <button className="ctrl-btn" onClick={() => adjust(1)}>+</button>
                        </div>
                    </div>
                </div>
            );
        };

        const MerchApp = () => {
            const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('eventOrgCart')) || []);

            useEffect(() => {
                localStorage.setItem('eventOrgCart', JSON.stringify(cart));
                const count = cart.reduce((s, i) => s + i.quantity, 0);
                const badge = document.getElementById('globalCartCount');
                if(badge) badge.innerText = count;
            }, [cart]);

            const handleUpdate = (product, quantity) => {
                setCart(prev => {
                    const filtered = prev.filter(item => item.id !== product.id);
                    if (quantity === 0) return filtered;
                    return [...filtered, { ...product, quantity, type: 'merch' }];
                });
            };

            return (
                <section className="section">
                    <h1 className="glass-heading">COLLECTION</h1>
                    <div className="merch-grid">
                        {PRODUCTS.map(p => {
                            const item = cart.find(i => i.id === p.id);
                            return <ProductCard key={p.id} product={p} initialQty={item ? item.quantity : 0} onUpdate={handleUpdate} />;
                        })}
                    </div>
                </section>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('merch-root'));
        root.render(<MerchApp />);
    </script>
</body>
</html>
